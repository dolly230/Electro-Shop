<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Your Cart - ElectroShop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">← Back to Home</a>
    </div>
  </nav>

  <!-- Cart Section -->
  <div class="container my-5">

    <h2 class="text-center text-warning mb-4">
      🛒 Your Shopping Cart
    </h2>

    <div id="cart-items" class="row g-4"></div>

    <h3 class="text-center mt-4">
      Total: ₹<span id="total-price">0</span>
    </h3>

    <div class="text-center mt-3">

      <button class="btn btn-success" onclick="checkout()">
        Proceed to Checkout
      </button>

      <button class="btn btn-danger" onclick="clearCart()">
        Clear Cart
      </button>

    </div>

  </div>

  <!-- Footer -->
  <footer class="text-center bg-dark text-white py-3">
    © 2025 ElectroShop | Cart Page
  </footer>

  <script>

    // GET DATA FROM LOCAL STORAGE
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const cartContainer = document.getElementById("cart-items");

    const totalPriceEl = document.getElementById("total-price");



    // RENDER CART
    function renderCart() {

      // EMPTY CART
      if (cart.length === 0) {

        cartContainer.innerHTML =
          "<h4 class='text-center'>Your cart is empty</h4>";

        totalPriceEl.textContent = 0;

        return;
      }

      // SHOW PRODUCTS
      cartContainer.innerHTML = cart.map((item, index) => `

        <div class="col-md-4">

          <div class="card shadow">

            <img src="${item.img}"
                 class="card-img-top"
                 style="height:250px; object-fit:cover;">

            <div class="card-body text-center">

              <h5>${item.name}</h5>

              <p class="fw-bold">₹${item.price}</p>

              <button class="btn btn-danger"
                      onclick="removeItem(${index})">

                Remove

              </button>

            </div>

          </div>

        </div>

      `).join("");



      // TOTAL PRICE
      const total = cart.reduce((sum, item) => {

        return sum + Number(item.price);

      }, 0);

      totalPriceEl.textContent = total;
    }



    // REMOVE ITEM
    function removeItem(index) {

      cart.splice(index, 1);

      localStorage.setItem("cart", JSON.stringify(cart));

      renderCart();
    }



    // CLEAR CART
    function clearCart() {

      if (confirm("Clear all items from cart?")) {

        localStorage.removeItem("cart");

        cart = [];

        renderCart();
      }
    }



    // CHECKOUT
    function checkout() {

      // LOGIN CHECK
      if (localStorage.getItem("isLoggedIn") !== "true") {

        alert("Please Login First!");

        window.location.href = "login.html";

        return;
      }

      alert("Order Placed Successfully 🛍️");

      localStorage.removeItem("cart");

      cart = [];

      renderCart();
    }



    // LOAD CART
    renderCart();

  </script>

</body>

</html>
